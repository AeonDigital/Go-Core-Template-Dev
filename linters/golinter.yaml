version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

output:
  formats:
    colored: stdout
    github-actions: stdout
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  # Strict line length enforcement to optimize readability across displays
  ll:
    line-length: 120
    tab-width: 2

  # Enforces a stricter, more deterministic formatting standard than standard gofmt
  gofumpt:
    extra-rules: true

  # Code complexity and function length thresholds to prevent technical debt
  funlen:
    lines: 128
    statements: 64
  gocyclo:
    min-complexity: 8

  # Enforces documentation standards matching Section 1.2 and 1.3 of the Style Guide
  revive:
    severity: error
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
      - name: comment-spacings

# New v2 mandatory section for purely structural formatting engines
formatters:
  enable:
    - gofumpt # Enforces your vertical layout style rule
  disable:
    - gofmt
    - goimports
    - gci # Safely isolated here as a formatter to prevent configuration crashes
    - golines

linters:
  disable-all: false
  enable-all: true
  # Kept strictly for v2 valid semantic logic/bug analysis rules
  disable:
    - godot # Disables strict/buggy period enforcement on comments
    - errcheck # Disables enforcement of checked error return values globally
    - depguard # Requires manual import whitelisting
    - exhaustruct # Forces initialization of all structural fields
    - wsl_v5 # Updated for v2 syntax; conflicts with modern gofumpt layout handling
    - godox # Blocks tracking keywords (TODO/FIXME)
    - varnamelen # Enforces arbitrary variable name lengths

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
